<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .chamfer-clip {
            clip-path: polygon(10% 0, 100% 0, 100% 70%, 90% 100%, 0 100%, 0 30%);
        }
        .chamfer-clip-sm {
            clip-path: polygon(4px 0, 100% 0, 100% calc(100% - 4px), calc(100% - 4px) 100%, 0 100%, 0 4px);
        }
        .glass-panel {
            backdrop-filter: blur(12px);
            background: rgba(18, 19, 22, 0.8);
        }
        .scanline-overlay {
            background: linear-gradient(to bottom, transparent 50%, rgba(0, 240, 255, 0.05) 50%);
            background-size: 100% 4px;
        }
    
        @keyframes intense-pulse {
            0%, 100% { transform: scale(1); filter: brightness(1) blur(0px); shadow: 0 0 40px rgba(255, 0, 0, 0.4); }
            50% { transform: scale(1.05); filter: brightness(1.5) blur(1px); shadow: 0 0 100px rgba(255, 0, 0, 0.8); }
        }
        @keyframes rays-rotation {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .intense-glow-pulse {
            animation: intense-pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        .light-rays {
            background: conic-gradient(from 0deg, transparent 0%, rgba(255, 0, 0, 0.1) 10%, transparent 20%, rgba(255, 0, 0, 0.1) 30%, transparent 40%, rgba(255, 0, 0, 0.1) 50%, transparent 60%, rgba(255, 0, 0, 0.1) 70%, transparent 80%, rgba(255, 0, 0, 0.1) 90%, transparent 100%);
            animation: rays-rotation 20s linear infinite;
        }
        .animate-spin-slow {
            animation: rays-rotation 60s linear infinite;
        }
    </style>
