<style>
        .chamfer-clip {
            clip-path: polygon(10% 0, 100% 0, 100% 70%, 90% 100%, 0 100%, 0 30%);
        }
        .chamfer-clip-sm {
            clip-path: polygon(4px 0, 100% 0, 100% calc(100% - 4px), calc(100% - 4px) 100%, 0 100%, 0 4px);
        }
        .glass-panel {
            backdrop-filter: blur(12px);
            background: rgba(18, 19, 22, 0.8);
        }
        .scanline-overlay {
            background: linear-gradient(to bottom, transparent 50%, rgba(0, 240, 255, 0.05) 50%);
            background-size: 100% 4px;
        }
    
        @keyframes intense-pulse {
            0%, 100% { transform: scale(1); filter: brightness(0.98) saturate(1); box-shadow: 0 0 85px rgba(255, 0, 0, 0.3), 0 0 38px rgba(255, 0, 0, 0.24); }
            50% { transform: scale(1.02); filter: brightness(1.14) saturate(1.1); box-shadow: 0 0 112px rgba(255, 0, 0, 0.4), 0 0 56px rgba(255, 0, 0, 0.3); }
        }
        @keyframes rays-rotation {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        @keyframes glitch-jitter {
            0%, 92%, 100% { transform: translate(0, 0); opacity: 0.22; }
            93% { transform: translate(-1px, 1px); opacity: 0.38; }
            95% { transform: translate(1px, -1px); opacity: 0.34; }
            97% { transform: translate(0, 1px); opacity: 0.28; }
        }
        @keyframes data-flicker {
            0%, 100% { opacity: 0.08; }
            30% { opacity: 0.12; }
            31% { opacity: 0.04; }
            32% { opacity: 0.14; }
            65% { opacity: 0.06; }
            66% { opacity: 0.13; }
        }
        @keyframes holo-sweep {
            0% { transform: translateY(-120%); opacity: 0; }
            20% { opacity: 0.2; }
            45% { opacity: 0.05; }
            100% { transform: translateY(120%); opacity: 0; }
        }
        .intense-glow-pulse {
            animation: intense-pulse 6s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        .light-rays {
            background: conic-gradient(from 0deg, transparent 0%, rgba(255, 0, 0, 0.06) 10%, transparent 20%, rgba(255, 0, 0, 0.06) 30%, transparent 40%, rgba(255, 0, 0, 0.06) 50%, transparent 60%, rgba(255, 0, 0, 0.06) 70%, transparent 80%, rgba(255, 0, 0, 0.06) 90%, transparent 100%);
            animation: rays-rotation 20s linear infinite;
        }
        .animate-spin-slow {
            animation: rays-rotation 60s linear infinite;
        }
        .eye-shell {
            border-color: rgba(51, 65, 85, 0.8);
        }
        .eye-core {
            box-shadow: 0 0 60px rgba(255, 0, 0, 0.52), 0 0 26px rgba(255, 90, 90, 0.32);
        }
        .glitch-ring {
            background: repeating-linear-gradient(0deg, rgba(0, 240, 255, 0.2) 0 2px, transparent 2px 5px);
            mix-blend-mode: screen;
            animation: glitch-jitter 5s steps(2, end) infinite;
        }
        .data-noise {
            background-image: radial-gradient(circle at 20% 30%, rgba(0, 240, 255, 0.22) 0 1px, transparent 1px), radial-gradient(circle at 70% 60%, rgba(255, 255, 255, 0.18) 0 1px, transparent 1px);
            background-size: 22px 22px, 30px 30px;
            animation: data-flicker 3.2s steps(2, end) infinite;
        }
        .holo-sweep {
            background: linear-gradient(to bottom, transparent, rgba(0, 240, 255, 0.28), transparent);
            animation: holo-sweep 4.8s linear infinite;
        }
        .eye-iris,
        .eye-pupil {
            will-change: transform;
            transform-origin: center;
        }
    </style>

<script>
    (function () {
        var eyeShell = document.getElementById("eye-shell");
        var eyeCore = document.getElementById("eye-core");
        var iris = document.getElementById("eye-iris");
        var pupil = document.getElementById("eye-pupil");

        if (!eyeShell || !eyeCore || !iris || !pupil) {
            return;
        }

        var targetX = 0;
        var targetY = 0;
        var currentX = 0;
        var currentY = 0;
        var targetPupilScale = 1;
        var currentPupilScale = 1;
        var previousMouseX = window.innerWidth / 2;
        var previousMouseY = window.innerHeight / 2;
        var resetDelayMs = 180;
        var resetTimerId = null;

        function isInteractiveHoverTarget(target) {
            return !!(target && target.closest("a, button"));
        }

        function clearResetTimer() {
            if (resetTimerId !== null) {
                clearTimeout(resetTimerId);
                resetTimerId = null;
            }
        }

        function updateTargetFromPointer(clientX, clientY) {
            var rect = eyeShell.getBoundingClientRect();
            var centerX = rect.left + rect.width / 2;
            var centerY = rect.top + rect.height / 2;
            var dx = clientX - centerX;
            var dy = clientY - centerY;
            var dist = Math.hypot(dx, dy) || 1;
            var maxEyeOffset = Math.min(rect.width, rect.height) * 0.12;
            var scale = Math.min(1, maxEyeOffset / dist);

            targetX = dx * scale;
            targetY = dy * scale;

            var mouseSpeed = Math.hypot(clientX - previousMouseX, clientY - previousMouseY);
            targetPupilScale = Math.max(0.92, Math.min(1.06, 1 - mouseSpeed * 0.0015));
            previousMouseX = clientX;
            previousMouseY = clientY;
        }

        function render() {
            currentX += (targetX - currentX) * 0.14;
            currentY += (targetY - currentY) * 0.14;
            currentPupilScale += (targetPupilScale - currentPupilScale) * 0.12;

            var irisDriftX = currentX * 0.22;
            var irisDriftY = currentY * 0.22;
            var pupilDriftX = currentX * 0.12;
            var pupilDriftY = currentY * 0.12;

            eyeCore.style.transform = "translate(" + currentX.toFixed(2) + "px, " + currentY.toFixed(2) + "px)";
            iris.style.transform = "translate(calc(-50% + " + irisDriftX.toFixed(2) + "px), calc(-50% + " + irisDriftY.toFixed(2) + "px))";
            pupil.style.transform = "translate(calc(-50% + " + pupilDriftX.toFixed(2) + "px), calc(-50% + " + pupilDriftY.toFixed(2) + "px)) scale(" + currentPupilScale.toFixed(3) + ")";

            requestAnimationFrame(render);
        }

        function resetEye() {
            targetX = 0;
            targetY = 0;
            targetPupilScale = 1;
        }

        function scheduleResetEye() {
            clearResetTimer();
            resetTimerId = setTimeout(function () {
                resetEye();
                resetTimerId = null;
            }, resetDelayMs);
        }

        window.addEventListener("pointermove", function (event) {
            if (isInteractiveHoverTarget(event.target)) {
                clearResetTimer();
                updateTargetFromPointer(event.clientX, event.clientY);
            } else {
                scheduleResetEye();
            }
        });

        window.addEventListener("pointerleave", scheduleResetEye);
        window.addEventListener("blur", scheduleResetEye);

        requestAnimationFrame(render);
    })();
</script></body></html>
